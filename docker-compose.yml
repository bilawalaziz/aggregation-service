services:
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: aggregation-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - aggregation-network

  node-backend:
    build:
      context: ./node-backend
      dockerfile: Dockerfile
    container_name: aggregation-node-backend
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      RABBITMQ_URL: ${RABBITMQ_URL}
      TASK_QUEUE: ${TASK_QUEUE}
      RESULT_QUEUE: ${RESULT_QUEUE}
      JSON_PLACEHOLDER_URL: ${JSON_PLACEHOLDER_URL}
      MAX_RETRIES: ${MAX_RETRIES}
      RETRY_DELAY_MS: ${RETRY_DELAY_MS}
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./node-backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:${PORT}/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - aggregation-network
    restart: unless-stopped

  python-producer:
    build:
      context: ./python-producer
      dockerfile: Dockerfile
    container_name: aggregation-python-producer
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL}
      TASK_QUEUE: ${TASK_QUEUE}
      RESULT_QUEUE: ${RESULT_QUEUE}
      AUTO_GENERATE_TASKS: ${AUTO_GENERATE_TASKS}
      TASK_GENERATION_INTERVAL: ${TASK_GENERATION_INTERVAL}
    depends_on:
      rabbitmq:
        condition: service_healthy
      node-backend:
        condition: service_healthy
    networks:
      - aggregation-network
    restart: unless-stopped

networks:
  aggregation-network:
    driver: bridge

volumes:
  rabbitmq_data:
    driver: local